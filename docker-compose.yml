services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rooben
      POSTGRES_PASSWORD: rooben
      POSTGRES_DB: rooben
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooben"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-gateway:
    build: ./mcp-gateway
    volumes:
      - rooben_secrets:/app/.rooben
      - npm_cache:/root/.npm
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
    volumes:
      - rooben_secrets:/app/.rooben
    environment:
      DATABASE_URL: postgresql://rooben:rooben@postgres:5432/rooben
      ROOBEN_API_KEYS: ${ROOBEN_API_KEYS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ROOBEN_STATIC_DIR: /app/static
      MCP_GATEWAY_URL: http://mcp-gateway:8080
    ports:
      - "8420:8420"

  dashboard:
    build: ./dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_INTERNAL_API_URL: http://api:8420
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  rooben_secrets:
  npm_cache:

networks:
  default:
    name: rooben
