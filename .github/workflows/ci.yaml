name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[test,dashboard,mcp]"
      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/e2e -v --timeout=60

  validate:
    name: Validate Extensions
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .
      - name: Validate extension manifests
        run: |
          python -c "
          from pathlib import Path
          from rooben.extensions.manifest import load_manifest
          errors = []
          for f in Path('extensions').rglob('rooben-extension.yaml'):
              try:
                  load_manifest(f)
                  print(f'  OK: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'  FAIL: {f}: {e}')
          if errors:
              raise SystemExit(f'{len(errors)} manifest(s) failed validation')
          print('All manifests valid')
          "
