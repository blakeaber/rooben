  - id: AC-001
    description: CV parser extracts skills as a list of {name, level, years} objects
      from plain text input
    verification: test
    priority: critical
  - id: AC-002
    description: CV parser supports both PDF (via pdfplumber) and plain text (.txt)
      input formats
    verification: test
    priority: high
  - id: AC-003
    description: CV parser outputs valid JSON matching the Profile schema (Pydantic
      model)
    verification: test
    priority: critical
  - id: AC-004
    description: Job scraper returns structured listings with title, company, location,
      url, and description fields
    verification: test
    priority: critical
  - id: AC-005
    description: Job scraper handles pagination (fetches at least 2 pages of results)
    verification: llm_judge
    priority: high
  - id: AC-006
    description: Job scraper includes random delays between requests (1-3 seconds)
      to avoid rate limiting
    verification: llm_judge
    priority: medium
  - id: AC-007
    description: Job scorer produces a 0-100 overall_score for each job with skill_match,
      seniority_fit, industry_match, and title_match sub-scores
    verification: test
    priority: critical
  - id: AC-008
    description: Job scorer batches jobs (max 10 per LLM call) to minimize API usage
    verification: llm_judge
    priority: high
  - id: AC-009
    description: Job scorer has a keyword-based fallback when ANTHROPIC_API_KEY is
      not set
    verification: test
    priority: high
  - id: AC-010
    description: Pipeline CLI accepts a CV path, --location, --remote, and --top flags
      and produces output
    verification: test
    priority: critical
  - id: AC-011
    description: Pipeline deduplicates jobs by URL before scoring
    verification: test
    priority: high
  - id: AC-012
    description: Each service has at least 3 unit tests with fixture/mock data
    verification: llm_judge
    priority: high
  - id: AC-013
    description: Tests run without network access or API keys (all external calls
      are mocked)
    verification: test
    priority: critical
  - id: AC-014
    description: requirements.txt lists all dependencies and README shows usage examples
    verification: llm_judge
    priority: medium
  test_requirements:
  - id: TR-001
    description: CV parser extracts skills from fixture text
    test_type: unit
    target_deliverable: D-001
    skeleton: "import pytest\nfrom cv_parser import parse_cv_text, Profile\n\nFIXTURE_CV\
      \ = \"\"\"\nJohn Doe\njohn@example.com | (555) 123-4567\n\nSenior Software Engineer\
      \ with 8 years of experience in Python,\ndistributed systems, and cloud infrastructure.\
      \ Expert in FastAPI,\nPostgreSQL, and AWS. Previously at Google and Stripe.\n\
      \nExperience:\n- Senior Engineer, Stripe (2020-2024): Led payments API team\n\
      - Software Engineer, Google (2016-2020): Built data pipelines\n\nEducation:\n\
      - MS Computer Science, Stanford University, 2016\n- BS Mathematics, MIT, 2014\n\
      \nSkills: Python, Go, FastAPI, PostgreSQL, AWS, Kubernetes, Docker\n\"\"\"\n\
      \n@pytest.mark.asyncio\nasync def test_parse_skills():\n    profile = await\
      \ parse_cv_text(FIXTURE_CV)\n    skill_names = [s.name.lower() for s in profile.skills]\n\
      \    assert \"python\" in skill_names\n    assert \"fastapi\" in skill_names\n\
      \    assert len(profile.skills) >= 5\n\n@pytest.mark.asyncio\nasync def test_parse_experience():\n\
      \    profile = await parse_cv_text(FIXTURE_CV)\n    assert len(profile.experience)\
      \ >= 2\n    assert any(\"stripe\" in e.company.lower() for e in profile.experience)\n\
      \n@pytest.mark.asyncio\nasync def test_profile_is_valid_json():\n    profile\
      \ = await parse_cv_text(FIXTURE_CV)\n    json_str = profile.model_dump_json()\n\
      \    assert \"john\" in json_str.lower()\n"
  - id: TR-002
    description: Job scraper returns structured listings with mock browser
    test_type: unit
    target_deliverable: D-002
  - id: TR-003
    description: Job scorer produces valid scores
    test_type: unit
    target_deliverable: D-003
    skeleton: "import pytest\nfrom job_scorer import score_jobs_keyword, ScoredJob\n\
      \nFIXTURE_PROFILE = {\n    \"skills\": [\n        {\"name\": \"Python\", \"\
      level\": \"expert\", \"years\": 8},\n        {\"name\": \"FastAPI\", \"level\"\
      : \"expert\", \"years\": 4},\n        {\"name\": \"PostgreSQL\", \"level\":\
      \ \"advanced\", \"years\": 5},\n    ],\n    \"preferred_titles\": [\"Senior\
      \ Software Engineer\", \"Staff Engineer\"],\n    \"industries\": [\"fintech\"\
      , \"payments\"],\n}\n\nFIXTURE_JOBS = [\n    {\n        \"title\": \"Senior\
      \ Python Engineer\",\n        \"company\": \"Acme Corp\",\n        \"location\"\
      : \"Remote\",\n        \"url\": \"https://example.com/job/1\",\n        \"description\"\
      : \"Looking for a senior Python developer with FastAPI and PostgreSQL experience\
      \ in fintech.\",\n    },\n    {\n        \"title\": \"Junior PHP Developer\"\
      ,\n        \"company\": \"Other Inc\",\n        \"location\": \"NYC\",\n   \
      \     \"url\": \"https://example.com/job/2\",\n        \"description\": \"Entry-level\
      \ PHP developer for WordPress sites.\",\n    },\n]\n\ndef test_keyword_scorer_ranks_correctly():\n\
      \    scored = score_jobs_keyword(FIXTURE_PROFILE, FIXTURE_JOBS)\n    assert\
      \ len(scored) == 2\n    # Python/FastAPI job should score higher than PHP job\n\
      \    assert scored[0].overall_score > scored[1].overall_score\n    assert scored[0].title\
      \ == \"Senior Python Engineer\"\n\ndef test_scores_in_range():\n    scored =\
      \ score_jobs_keyword(FIXTURE_PROFILE, FIXTURE_JOBS)\n    for job in scored:\n\
      \        assert 0 <= job.overall_score <= 100\n        assert 0 <= job.skill_match\
      \ <= 100\n"
  - id: TR-004
    description: Pipeline deduplicates jobs by URL
    test_type: unit
    target_deliverable: D-004
    skeleton: "from pipeline import deduplicate_jobs\n\ndef test_dedup_by_url():\n\
      \    jobs = [\n        {\"title\": \"Job A\", \"url\": \"https://example.com/1\"\
      },\n        {\"title\": \"Job B\", \"url\": \"https://example.com/2\"},\n  \
      \      {\"title\": \"Job A duplicate\", \"url\": \"https://example.com/1\"},\n\
      \    ]\n    deduped = deduplicate_jobs(jobs)\n    assert len(deduped) == 2\n\
      \    urls = [j[\"url\"] for j in deduped]\n    assert len(set(urls)) == 2\n"
  - id: TR-005
    description: Integration test with all services mocked
    test_type: integration
    target_deliverable: D-005
  completion_threshold: 0.85
constraints:
- id: C-001
  category: technology
  description: Python 3.11+, Pydantic v2 for models, click for CLIs, playwright for
    browser automation, anthropic SDK for LLM calls
  hard: true
- id: C-002
  category: technology
  description: Each service must be a single .py file that works standalone (no package
    structure required)
  hard: true
- id: C-003
  category: security
  description: API keys must come from environment variables (ANTHROPIC_API_KEY),
    never hardcoded
  hard: true
- id: C-004
  category: security
  description: Job scraper must use random delays (1-3s) between page navigations
    to avoid ban
  hard: true
- id: C-005
  category: compatibility
  description: All services must have a no-API-key fallback mode (regex parsing, keyword
    scoring)
  hard: false
agents:
- id: llm-service-dev
  name: LLM Service Developer
  transport: llm
  description: Builds Python services that use the Anthropic SDK for LLM-powered extraction
    and scoring
  capabilities:
  - python
  - anthropic-sdk
  - pydantic
  - llm-integration
  - click
  max_concurrency: 2
  budget:
    max_retries_per_task: 3
  max_turns: 25
- id: browser-automation-dev
  name: Browser Automation Developer
  transport: llm
  description: Builds Playwright-based browser automation scripts for web scraping
    and data extraction
  capabilities:
  - python
  - playwright
  - web-scraping
  - async
  - browser-automation
  max_concurrency: 1
  budget:
    max_retries_per_task: 3
  max_turns: 25
- id: integration-dev
  name: Integration Developer
  transport: llm
  description: Wires standalone services into pipelines with Click CLIs and handles
    data flow between components
  capabilities:
  - python
  - click
  - integration
  - cli
  - data-pipelines
  max_concurrency: 1
  budget:
    max_retries_per_task: 3
  max_turns: 25
- id: test-engineer
  name: Test Engineer
  transport: llm
  description: Writes pytest tests with mocked external dependencies (no network,
    no API keys)
  capabilities:
  - python
  - pytest
  - mocking
  - playwright-testing
  - fixtures
  max_concurrency: 2
  budget:
    max_retries_per_task: 2
  max_turns: 25
global_budget:
  max_total_tasks: 25
  max_concurrent_agents: 4
  max_wall_seconds: 900
notes: "The planner should discover this dependency graph:\n\n  D-001 (CV parser)\
  \ and D-002 (job scraper) are independent — they can be\n  built concurrently by\
  \ different agents (llm-service-dev and\n  browser-automation-dev).\n\n  D-003 (job\
  \ scorer) depends on D-001's Profile model but not on D-002's\n  code (it just consumes\
  \ the same JSON format).\n\n  D-004 (pipeline CLI) depends on all three services\
  \ (D-001, D-002, D-003).\n\n  D-005 (tests) depends on all production services.\n\
  \n  D-006 (requirements + README) depends on knowing the full dependency list.\n\
  \nExpected concurrent dispatch:\n  Batch 1: D-001 (llm-service-dev) + D-002 (browser-automation-dev)\
  \ in parallel\n  Batch 2: D-003 (llm-service-dev) — needs Profile model from D-001\n\
  \  Batch 3: D-004 (integration-dev) + D-006 (integration-dev)\n  Batch 4: D-005\
  \ (test-engineer)\n\nEach deliverable is a STANDALONE Python file. The agents should\
  \ write\ncomplete, runnable .py files as artifacts — not stubs or pseudocode.\n\
  Every file must have:\n  - A `if __name__ == \"__main__\":` block with CLI argument\
  \ parsing\n  - Exported functions for library use\n  - Pydantic models for input/output\
  \ schemas\n  - Error handling for missing dependencies/API keys\n"
