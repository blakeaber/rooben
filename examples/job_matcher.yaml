id: spec-job-matcher
version: 1.0.0
title: Autonomous Job Matching Pipeline
goal: "Build a set of standalone Python services that autonomously find job postings\n\
  matching a user's CV/resume and produce a ranked report. Each service is a\nrunnable\
  \ Python module that can operate independently or be composed into a\npipeline.\n\
  \nThe pipeline:\n  1. Parse a CV (PDF/text) into a structured professional profile\n\
  \  2. Search for job postings across multiple sources concurrently\n  3. Score each\
  \ posting against the profile\n  4. Produce a ranked report with match scores and\
  \ application links\n\nEach service must be a standalone .py file that works with\
  \ `python -m` and\nalso exposes a function callable from other Python code.\n"
context: "The system produces four standalone Python services as output artifacts:\n\
  \n1. cv_parser.py — Reads a CV file (PDF or plain text), extracts structured\n \
  \  data: skills, job titles, years of experience, industries, education,\n   certifications.\
  \ Uses an LLM (Claude) for intelligent extraction. Can be\n   run as: `python cv_parser.py\
  \ resume.pdf --output profile.json`\n\n2. job_scraper.py — Uses Playwright to search\
  \ for jobs on the open web via\n   configurable search engines and job boards. Accepts\
  \ search parameters\n   (keywords, location, remote preference) and returns structured\
  \ job\n   listings. Can be run as: `python job_scraper.py --keywords \"python engineer\"\
  \ --location \"remote\"`\n\n3. job_scorer.py — Takes a profile JSON and a list of\
  \ job postings, scores\n   each posting on a 0-100 scale across dimensions (skill\
  \ match, seniority\n   fit, industry alignment, location preference). Uses an LLM\
  \ for semantic\n   matching. Can be run as: `python job_scorer.py profile.json jobs.json\
  \ --output scored.json`\n\n4. pipeline.py — CLI that wires the three services together:\
  \ parse CV →\n   search jobs → score → output ranked report. Can be run as:\n  \
  \ `python pipeline.py resume.pdf --location \"San Francisco\" --top 20`\n\nEach\
  \ service writes its output to stdout (JSON) or a file, making them\ncomposable\
  \ via Unix pipes or direct Python imports.\n"
rationale: "Building standalone services rather than monolithic code means:\n  - Each\
  \ service can be tested, debugged, and iterated independently\n  - The pipeline\
  \ can be run all at once or step-by-step\n  - Individual services can be replaced\
  \ (e.g., swap Playwright for a\n    different scraper) without touching the rest\n\
  \  - The LLM-powered services (parser, scorer) can use any provider\n\nPlaywright\
  \ is used for job scraping because:\n  - Job boards (LinkedIn, Indeed) serve content\
  \ to browsers but restrict APIs\n  - Google Jobs aggregates listings from many sources\
  \ and is search-accessible\n  - A headless browser can navigate paginated results\
  \ naturally\n  - No API keys or partner agreements needed\n"
deliverables:
- id: D-001
  name: CV Parser Service
  deliverable_type: application
  description: "Standalone Python module: cv_parser.py\n\nInput: Path to CV file (PDF\
    \ or .txt)\nOutput: JSON profile with fields:\n  - name, email, phone (contact\
    \ info)\n  - skills: list of {name, level, years} objects\n  - experience: list\
    \ of {title, company, start, end, description}\n  - education: list of {degree,\
    \ institution, year}\n  - certifications: list of strings\n  - summary: 2-3 sentence\
    \ professional summary\n  - preferred_titles: inferred job titles the person would\
    \ target\n  - industries: list of industries they've worked in\n\nMust work as:\n\
    \  CLI: python cv_parser.py resume.pdf --output profile.json\n  Library: from\
    \ cv_parser import parse_cv; profile = await parse_cv(\"resume.pdf\")\n\nUses\
    \ anthropic SDK to call Claude for intelligent extraction.\nFalls back to regex-based\
    \ extraction if no API key is set.\n"
  output_path: output/cv_parser.py
  acceptance_criteria_ids:
  - AC-001
  - AC-002
  - AC-003
- id: D-002
  name: Job Scraper Service
  deliverable_type: application
  description: "Standalone Python module: job_scraper.py\n\nInput: Search parameters\
    \ (keywords, location, remote flag, max results)\nOutput: JSON list of job postings,\
    \ each with:\n  - title, company, location, url\n  - description (full text or\
    \ summary)\n  - posted_date (if available)\n  - salary_range (if available)\n\
    \  - source (which site it was found on)\n\nMust work as:\n  CLI: python job_scraper.py\
    \ --keywords \"python,fastapi\" --location \"remote\" --max 50\n  Library: from\
    \ job_scraper import search_jobs; jobs = await search_jobs(keywords=[...])\n\n\
    Uses Playwright (async) to:\n  1. Search Google Jobs (site:linkedin.com OR site:indeed.com\
    \ ...)\n  2. Extract structured data from search result snippets\n  3. Optionally\
    \ navigate to individual listing pages for full descriptions\n  4. Handle pagination\
    \ (click \"next\" or scroll)\n\nMust handle rate limiting (random delays between\
    \ requests).\nMust support headless and headed modes for debugging.\n"
  output_path: output/job_scraper.py
  acceptance_criteria_ids:
  - AC-004
  - AC-005
  - AC-006
- id: D-003
  name: Job Scorer Service
  deliverable_type: application
  description: "Standalone Python module: job_scorer.py\n\nInput: Profile JSON (from\
    \ cv_parser) + list of job postings (from job_scraper)\nOutput: Scored and ranked\
    \ list with:\n  - All original job fields\n  - overall_score: 0-100 composite\n\
    \  - skill_match: 0-100 (how many required skills the candidate has)\n  - seniority_fit:\
    \ 0-100 (junior/mid/senior alignment)\n  - industry_match: 0-100 (domain relevance)\n\
    \  - title_match: 0-100 (how close the title is to preferred_titles)\n  - reasoning:\
    \ 1-2 sentence explanation of the score\n\nMust work as:\n  CLI: python job_scorer.py\
    \ profile.json jobs.json --output scored.json --top 20\n  Library: from job_scorer\
    \ import score_jobs; scored = await score_jobs(profile, jobs)\n\nUses Claude to\
    \ semantically compare profile against each job description.\nBatches jobs (10\
    \ per LLM call) to minimize API usage.\nFalls back to keyword-based TF-IDF scoring\
    \ if no API key is set.\n"
  output_path: output/job_scorer.py
  acceptance_criteria_ids:
  - AC-007
  - AC-008
  - AC-009
- id: D-004
  name: Pipeline CLI
  deliverable_type: application
  description: "Standalone Python module: pipeline.py\n\nWires cv_parser → job_scraper\
    \ → job_scorer into a single command:\n  python pipeline.py resume.pdf --location\
    \ \"SF Bay Area\" --remote --top 20\n\nSteps:\n  1. Parse CV into profile (cv_parser)\n\
    \  2. Generate search queries from profile (skills + preferred_titles)\n  3. Run\
    \ multiple searches concurrently (job_scraper)\n  4. Deduplicate results by URL\n\
    \  5. Score all jobs against profile (job_scorer)\n  6. Output top N results as\
    \ formatted table or JSON\n\nUses click for CLI. Supports --output json|table|csv\
    \ formats.\nRequires cv_parser.py, job_scraper.py, and job_scorer.py from D-001..D-003.\n"
  output_path: output/pipeline.py
  acceptance_criteria_ids:
  - AC-010
  - AC-011
- id: D-005
  name: Test Suite
  deliverable_type: code
  description: "Pytest test suite covering:\n  - CV parser with a fixture resume (plain\
    \ text)\n  - Job scraper with mocked Playwright (no real browser needed in tests)\n\
    \  - Job scorer with fixture profile + jobs\n  - Pipeline integration with all\
    \ mocked services\n\nRequires all services (D-001 through D-004) to be implemented.\n"
  output_path: output/tests/
  acceptance_criteria_ids:
  - AC-012
  - AC-013
- id: D-006
  name: Requirements and README
  deliverable_type: document
  description: 'requirements.txt listing: anthropic, playwright, click, pdfplumber,
    pydantic

    README with usage examples for each service and the pipeline.

    '
  output_path: output/
  acceptance_criteria_ids:
  - AC-014
success_criteria:
